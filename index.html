<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/v3logo-sm.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>V3RII Metivon ERP</title>
    <script>
      (function() {
        const isBrandThemeListEnabled = localStorage.getItem('vite-ui-brand-theme-list-enabled') === 'true';
        const brandThemeClassMap = {
          v3rii: 'theme-v3rii',
          corporateBlue: 'theme-corporate-blue',
          graphite: 'theme-graphite',
          emerald: 'theme-emerald',
          executive: 'theme-executive',
          burgundy: 'theme-burgundy',
          industrialSteel: 'theme-industrial-steel',
          cleanLight: 'theme-clean-light',
          highContrast: 'theme-high-contrast',
          minimalCrm: 'theme-minimal-crm',
          flatNavy: 'theme-flat-navy',
          flatSlate: 'theme-flat-slate',
          flatWhite: 'theme-flat-white',
          warmSand: 'theme-warm-sand',
          skyMist: 'theme-sky-mist',
          softRose: 'theme-soft-rose',
        };
        const brandThemeAppearanceMap = {
          v3rii: 'dark',
          corporateBlue: 'light',
          graphite: 'dark',
          emerald: 'light',
          executive: 'dark',
          burgundy: 'dark',
          industrialSteel: 'dark',
          cleanLight: 'light',
          highContrast: 'dark',
          minimalCrm: 'light',
          flatNavy: 'dark',
          flatSlate: 'dark',
          flatWhite: 'light',
          warmSand: 'light',
          skyMist: 'light',
          softRose: 'light',
        };

        if (isBrandThemeListEnabled) {
          const brandTheme =
            localStorage.getItem('vite-ui-brand-theme-list-selection') ||
            localStorage.getItem('vite-ui-brand-theme') ||
            'v3rii';
          const themeClass = brandThemeClassMap[brandTheme] || 'theme-v3rii';
          let appearance = brandThemeAppearanceMap[brandTheme] || 'dark';
          if (brandTheme === 'v3rii') {
            const v3riiOverride = localStorage.getItem('vite-ui-v3rii-appearance-override');
            if (v3riiOverride === 'light' || v3riiOverride === 'dark') {
              appearance = v3riiOverride;
            }
          }
          document.documentElement.classList.add(appearance);
          document.documentElement.classList.add(themeClass);
          document.documentElement.dataset.brandTheme = brandThemeClassMap[brandTheme] ? brandTheme : 'v3rii';
          document.documentElement.dataset.brandThemeAppearance = appearance;
          return;
        }

        const theme = localStorage.getItem('vite-ui-theme') || 'system';
        if (theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.add('light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
